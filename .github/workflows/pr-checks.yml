name: PR Checks

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.svg'
      - LICENSE
  workflow_dispatch:

jobs:
  shell:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Validate shell scripts
        run: |
          find scripts -type f -name '*.sh' -print0 | while IFS= read -r -d '' file; do
            bash -n "$file"
          done
      - name: Smoke test installer entrypoints
        run: bash scripts/installer-smoke.sh
      - name: Smoke test release channel wiring
        run: bash scripts/release-smoke.sh
      - name: Run ShellCheck
        run: |
          find scripts -type f -name '*.sh' -print0 | while IFS= read -r -d '' file; do
            shellcheck -x -e SC1091 "$file"
          done

  actions:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run actionlint
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:latest

  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run cargo tests
        run: cargo test --locked

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm run build

  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: x86_64-unknown-linux-musl
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Package release assets
        run: bash scripts/package-release.sh
      - name: Verify release bundle
        run: bash scripts/verify-bundle.sh dist/*.tar.gz
      - name: Upload packaged assets
        uses: actions/upload-artifact@v7
        with:
          name: pr-packages
          path: dist/*
