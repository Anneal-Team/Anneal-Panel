name: Release Master

on:
  push:
    branches:
      - master
    paths:
      - Cargo.toml
      - web/package.json
      - web/package-lock.json
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      bundle_label: ${{ steps.meta.outputs.bundle_label }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      commit_ref: ${{ steps.meta.outputs.commit_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          resolve_workspace_version() {
            awk '
              $0 == "[workspace.package]" { in_section = 1; next }
              /^\[/ { in_section = 0 }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' "$1"
          }

          version="$(awk '
            $0 == "[workspace.package]" { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          [[ -n "${version}" ]] || {
            echo "workspace version is not set in Cargo.toml" >&2
            exit 1
          }

          should_release=false
          release_tag="v${version}"
          commit_ref=""

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            [[ "${tag_version}" == "${version}" ]] || {
              echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
              exit 1
            }
            should_release=true
            release_tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            [[ "${GITHUB_REF_NAME}" == "master" ]] || {
              echo "workflow_dispatch must target master or a semver tag" >&2
              exit 1
            }
            should_release=true
            commit_ref="${GITHUB_SHA}"
          elif [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "master" ]]; then
            previous_version=""
            if [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
              previous_toml="$(mktemp)"
              if git show "${BEFORE_SHA}:Cargo.toml" > "${previous_toml}" 2>/dev/null; then
                previous_version="$(resolve_workspace_version "${previous_toml}")"
              fi
              rm -f "${previous_toml}"
            fi

            if [[ "${previous_version}" != "${version}" ]]; then
              should_release=true
              commit_ref="${GITHUB_SHA}"
            fi
          fi

          if [[ "${should_release}" == "true" ]]; then
            existing_tag_commit="$(git ls-remote --tags origin "refs/tags/${release_tag}^{}" | awk 'NR==1 { print $1 }')"
            if [[ -z "${existing_tag_commit}" ]]; then
              existing_tag_commit="$(git ls-remote --tags origin "refs/tags/${release_tag}" | awk 'NR==1 { print $1 }')"
            fi
            if [[ -n "${existing_tag_commit}" && "${existing_tag_commit}" != "${GITHUB_SHA}" ]]; then
              echo "tag ${release_tag} already exists on another commit: ${existing_tag_commit}" >&2
              exit 1
            fi
          fi

          {
            echo "should_release=${should_release}"
            echo "bundle_label=${version}"
            echo "release_name=Anneal ${version}"
            echo "release_tag=${release_tag}"
            echo "commit_ref=${commit_ref}"
            echo "is_prerelease=false"
          } >> "${GITHUB_OUTPUT}"

  release:
    runs-on: ubuntu-24.04
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Package release bundle
        env:
          BUNDLE_VERSION_LABEL: ${{ needs.prepare.outputs.bundle_label }}
        run: bash scripts/package-release.sh
      - name: Verify release bundle
        run: bash scripts/verify-bundle.sh dist/*.tar.gz
      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: dist/*.tar.gz
          commit: ${{ needs.prepare.outputs.commit_ref }}
          name: ${{ needs.prepare.outputs.release_name }}
          omitBodyDuringUpdate: true
          prerelease: false
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ needs.prepare.outputs.release_tag }}
