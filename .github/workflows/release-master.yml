name: Release Master

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
      - '*.*.*'
    paths-ignore:
      - '**/*.md'
      - '**/*.svg'
      - LICENSE
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      bundle_label: ${{ steps.meta.outputs.bundle_label }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      commit_ref: ${{ steps.meta.outputs.commit_ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk '
            $0 == "[workspace.package]" { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          [[ -n "${version}" ]] || {
            echo "workspace version is not set in Cargo.toml" >&2
            exit 1
          }

          should_release=false
          bundle_label=""
          release_name=""
          release_tag=""
          commit_ref=""

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            [[ "${tag_version}" == "${version}" ]] || {
              echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
              exit 1
            }
            should_release=true
            bundle_label="${version}"
            release_name="Anneal ${version}"
            release_tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_TYPE}" == "branch" && ( "${GITHUB_REF_NAME}" == "master" || ( "${GITHUB_REF_NAME}" == "dev" && "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ) ) ]]; then
            should_release=true
            bundle_label="rolling-master"
            release_name="Anneal master"
            release_tag="rolling-master"
            commit_ref="${GITHUB_SHA}"
          fi

          if [[ "${should_release}" == "true" && "${release_tag}" != "rolling-master" ]]; then
            existing_tag_commit="$(git ls-remote --tags origin "refs/tags/${release_tag}^{}" | awk 'NR==1 { print $1 }')"
            if [[ -z "${existing_tag_commit}" ]]; then
              existing_tag_commit="$(git ls-remote --tags origin "refs/tags/${release_tag}" | awk 'NR==1 { print $1 }')"
            fi
            if [[ -n "${existing_tag_commit}" && "${existing_tag_commit}" != "${GITHUB_SHA}" ]]; then
              echo "tag ${release_tag} already exists on another commit: ${existing_tag_commit}" >&2
              exit 1
            fi
          fi

          {
            echo "should_release=${should_release}"
            echo "bundle_label=${bundle_label}"
            echo "release_name=${release_name}"
            echo "release_tag=${release_tag}"
            echo "commit_ref=${commit_ref}"
            echo "is_prerelease=false"
          } >> "${GITHUB_OUTPUT}"

  release:
    runs-on: ubuntu-24.04
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: x86_64-unknown-linux-musl
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Package release bundle
        env:
          BUNDLE_VERSION_LABEL: ${{ needs.prepare.outputs.bundle_label }}
        run: bash scripts/package-release.sh
      - name: Verify release bundle
        run: bash scripts/verify-bundle.sh dist/*.tar.gz
      - name: Update rolling release tag
        if: needs.prepare.outputs.release_tag == 'rolling-master'
        run: |
          git tag -f rolling-master "${GITHUB_SHA}"
          git push origin refs/tags/rolling-master --force
      - name: Publish release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: dist/*.tar.gz
          commit: ${{ needs.prepare.outputs.commit_ref }}
          name: ${{ needs.prepare.outputs.release_name }}
          omitBodyDuringUpdate: true
          prerelease: false
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ needs.prepare.outputs.release_tag }}
