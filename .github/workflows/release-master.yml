name: Release Master

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == "tag" ]] || {
            echo "Release workflow must run on a semver tag." >&2
            exit 1
          }
          version="$(awk '
            $0 == "[workspace.package]" { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          tag_version="${GITHUB_REF_NAME#v}"
          [[ "${tag_version}" == "${version}" ]] || {
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
            exit 1
          }
          {
            echo "bundle_label=${version}"
            echo "release_name=Anneal ${version}"
            echo "release_tag=${GITHUB_REF_NAME}"
            echo "is_prerelease=false"
          } >> "${GITHUB_OUTPUT}"
      - name: Package release bundle
        env:
          BUNDLE_VERSION_LABEL: ${{ steps.meta.outputs.bundle_label }}
        run: bash scripts/package-release.sh
      - name: Verify release bundle
        run: bash scripts/verify-bundle.sh dist/*.tar.gz
      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: dist/*.tar.gz
          name: ${{ steps.meta.outputs.release_name }}
          omitBodyDuringUpdate: true
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ steps.meta.outputs.release_tag }}
