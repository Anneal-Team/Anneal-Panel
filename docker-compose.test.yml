services:
  test-tls:
    image: alpine:3.20
    command:
      - sh
      - -lc
      - |
        apk add --no-cache openssl >/dev/null
        mkdir -p /tls
        if [ ! -s /tls/ca.crt ] || [ ! -s /tls/ca.key ] || [ ! -s /tls/web.crt ] || [ ! -s /tls/web.key ]; then
          printf '%s\n' \
            '[req]' \
            'distinguished_name = dn' \
            'prompt = no' \
            'req_extensions = req_ext' \
            '[dn]' \
            'CN = web' \
            '[req_ext]' \
            'subjectAltName = @alt_names' \
            'keyUsage = critical,digitalSignature,keyEncipherment' \
            'extendedKeyUsage = serverAuth' \
            '[alt_names]' \
            'DNS.1 = web' \
            'DNS.2 = localhost' >/tmp/web.cnf
          openssl genrsa -out /tls/ca.key 4096
          openssl req -x509 -new -nodes -key /tls/ca.key -sha256 -days 3650 -subj "/CN=Anneal Test CA" -out /tls/ca.crt
          openssl genrsa -out /tls/web.key 2048
          openssl req -new -key /tls/web.key -subj "/CN=web" -out /tmp/web.csr -config /tmp/web.cnf
          openssl x509 -req -in /tmp/web.csr -CA /tls/ca.crt -CAkey /tls/ca.key -CAcreateserial -out /tls/web.crt -days 825 -sha256 -extensions req_ext -extfile /tmp/web.cnf
        fi
        tail -f /dev/null
    volumes:
      - anneal-test-tls:/tls
    healthcheck:
      test: ["CMD-SHELL", "test -s /tls/ca.crt -a -s /tls/web.crt -a -s /tls/web.key"]
      interval: 2s
      timeout: 2s
      retries: 30

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: anneal
      POSTGRES_USER: anneal
      POSTGRES_PASSWORD: anneal
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anneal -d anneal"]
      interval: 5s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector:0.128.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel/collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"

  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      ANNEAL_BIND_ADDRESS: 0.0.0.0:8080
      ANNEAL_DATABASE_URL: postgres://anneal:anneal@postgres:5432/anneal
      ANNEAL_BOOTSTRAP_TOKEN: test-bootstrap-token
      ANNEAL_DATA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ANNEAL_TOKEN_HASH_KEY: test-token-hash-key
      ANNEAL_ACCESS_JWT_SECRET: test-access-secret
      ANNEAL_PRE_AUTH_JWT_SECRET: test-preauth-secret
      ANNEAL_PUBLIC_BASE_URL: https://localhost:18081
      ANNEAL_CADDY_DOMAIN: localhost
      ANNEAL_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18080:8080"

  worker:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    environment:
      ANNEAL_DATABASE_URL: postgres://anneal:anneal@postgres:5432/anneal
      ANNEAL_DATA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ANNEAL_TOKEN_HASH_KEY: test-token-hash-key
      ANNEAL_ACCESS_JWT_SECRET: test-access-secret
      ANNEAL_PRE_AUTH_JWT_SECRET: test-preauth-secret
      ANNEAL_PUBLIC_BASE_URL: https://localhost:18081
      ANNEAL_CADDY_DOMAIN: localhost
      ANNEAL_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    volumes:
      - anneal-test-tls:/tls:ro
    depends_on:
      test-tls:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "18081:443"

  node-agent-e2e:
    image: anneal-node-agent-e2e
    build:
      context: .
      dockerfile: deploy/docker/node-agent.Dockerfile
    environment:
      ANNEAL_AGENT_SERVER_URL: https://web
      ANNEAL_AGENT_NAME: node-e2e
      ANNEAL_AGENT_VERSION: 0.1.0
      ANNEAL_AGENT_ENGINES: xray,singbox
      ANNEAL_AGENT_PROTOCOLS_XRAY: vless_reality,vmess,trojan,shadowsocks_2022
      ANNEAL_AGENT_PROTOCOLS_SINGBOX: vless_reality,vmess,trojan,shadowsocks_2022,tuic,hysteria2
      ANNEAL_AGENT_INTERVAL_SECONDS: "5"
      ANNEAL_AGENT_SKIP_RESTART: "true"
      ANNEAL_AGENT_XRAY_BINARY: /usr/local/bin/xray
      ANNEAL_AGENT_SINGBOX_BINARY: /usr/local/bin/hiddify-core
    command:
      - sh
      - -lc
      - while [ ! -s /tls/ca.crt ]; do sleep 1; done; cp /tls/ca.crt /usr/local/share/ca-certificates/anneal-test-ca.crt; update-ca-certificates >/dev/null 2>&1; while [ ! -s /e2e/node.bootstrap_token ]; do sleep 1; done; export ANNEAL_AGENT_BOOTSTRAP_TOKEN="$(cat /e2e/node.bootstrap_token)"; exec node-agent
    volumes:
      - anneal-node-state:/var/lib/anneal
      - anneal-e2e-shared:/e2e
      - anneal-test-tls:/tls:ro
    depends_on:
      test-tls:
        condition: service_healthy
      web:
        condition: service_started

  xray-runtime:
    image: anneal-node-agent-e2e
    command:
      - sh
      - -lc
      - while [ ! -f /var/lib/anneal/xray/config.json ]; do sleep 1; done; while true; do xray run -c /var/lib/anneal/xray/config.json || true; sleep 1; done
    volumes:
      - anneal-node-state:/var/lib/anneal
    ports:
      - "24443:24443"

  singbox-runtime:
    image: anneal-node-agent-e2e
    command:
      - sh
      - -lc
      - while [ ! -f /var/lib/anneal/singbox/config.json ]; do sleep 1; done; while true; do hiddify-core run -c /var/lib/anneal/singbox/config.json || true; sleep 1; done
    volumes:
      - anneal-node-state:/var/lib/anneal
    ports:
      - "25443:25443"
      - "25444:25444"

  e2e-runner:
    build:
      context: .
      dockerfile: deploy/docker/e2e-runner.Dockerfile
    environment:
      E2E_API_URL: https://web
      E2E_WEB_URL: https://web
      E2E_CA_CERT_PATH: /tls/ca.crt
      E2E_SHARED_DIR: /e2e
      E2E_AGENT_STATE_FILE: /state/agent-state.json
      E2E_BOOTSTRAP_TOKEN: test-bootstrap-token
    volumes:
      - anneal-e2e-shared:/e2e
      - anneal-node-state:/state:ro
      - anneal-test-tls:/tls:ro
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      worker:
        condition: service_started
      web:
        condition: service_started
      node-agent-e2e:
        condition: service_started

volumes:
  anneal-node-state:
  anneal-e2e-shared:
  anneal-test-tls:
