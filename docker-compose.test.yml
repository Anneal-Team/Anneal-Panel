services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: anneal
      POSTGRES_USER: anneal
      POSTGRES_PASSWORD: anneal
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anneal -d anneal"]
      interval: 5s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector:0.128.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/otel/collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"

  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      ANNEAL_BIND_ADDRESS: 0.0.0.0:8080
      ANNEAL_DATABASE_URL: postgres://anneal:anneal@postgres:5432/anneal
      ANNEAL_BOOTSTRAP_TOKEN: test-bootstrap-token
      ANNEAL_DATA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ANNEAL_ACCESS_JWT_SECRET: test-access-secret
      ANNEAL_PRE_AUTH_JWT_SECRET: test-preauth-secret
      ANNEAL_PUBLIC_BASE_URL: http://web
      ANNEAL_CADDY_DOMAIN: localhost
      ANNEAL_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18080:8080"

  worker:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    environment:
      ANNEAL_DATABASE_URL: postgres://anneal:anneal@postgres:5432/anneal
      ANNEAL_DATA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ANNEAL_ACCESS_JWT_SECRET: test-access-secret
      ANNEAL_PRE_AUTH_JWT_SECRET: test-preauth-secret
      ANNEAL_PUBLIC_BASE_URL: http://web
      ANNEAL_CADDY_DOMAIN: localhost
      ANNEAL_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    depends_on:
      - api
    ports:
      - "18081:80"

  node-agent-e2e-xray:
    image: anneal-node-agent-e2e
    build:
      context: .
      dockerfile: deploy/docker/node-agent.Dockerfile
    environment:
      ANNEAL_AGENT_SERVER_URL: http://api:8080
      ANNEAL_AGENT_NAME: node-e2e-xray
      ANNEAL_AGENT_VERSION: 0.1.0
      ANNEAL_AGENT_ENGINE: xray
      ANNEAL_AGENT_PROTOCOLS: vmess
      ANNEAL_AGENT_INTERVAL_SECONDS: "5"
      ANNEAL_AGENT_SKIP_RESTART: "true"
      ANNEAL_AGENT_XRAY_BINARY: /usr/local/bin/xray
      ANNEAL_AGENT_SINGBOX_BINARY: /usr/local/bin/hiddify-core
    command:
      - sh
      - -lc
      - while [ ! -s /e2e/xray.node_id ]; do sleep 1; done; export ANNEAL_AGENT_NODE_ID="$(cat /e2e/xray.node_id)"; exec node-agent
    volumes:
      - anneal-node-state-xray:/var/lib/anneal
      - anneal-e2e-shared:/e2e
    depends_on:
      - api

  node-agent-e2e-singbox:
    image: anneal-node-agent-e2e
    environment:
      ANNEAL_AGENT_SERVER_URL: http://api:8080
      ANNEAL_AGENT_NAME: node-e2e-singbox
      ANNEAL_AGENT_VERSION: 0.1.0
      ANNEAL_AGENT_ENGINE: singbox
      ANNEAL_AGENT_PROTOCOLS: vmess
      ANNEAL_AGENT_INTERVAL_SECONDS: "5"
      ANNEAL_AGENT_SKIP_RESTART: "true"
      ANNEAL_AGENT_XRAY_BINARY: /usr/local/bin/xray
      ANNEAL_AGENT_SINGBOX_BINARY: /usr/local/bin/hiddify-core
    command:
      - sh
      - -lc
      - while [ ! -s /e2e/singbox.node_id ]; do sleep 1; done; export ANNEAL_AGENT_NODE_ID="$(cat /e2e/singbox.node_id)"; exec node-agent
    volumes:
      - anneal-node-state-singbox:/var/lib/anneal
      - anneal-e2e-shared:/e2e
    depends_on:
      - api

  xray-runtime:
    image: anneal-node-agent-e2e
    command:
      - sh
      - -lc
      - while [ ! -f /var/lib/anneal/xray/config.json ]; do sleep 1; done; while true; do xray run -c /var/lib/anneal/xray/config.json || true; sleep 1; done
    volumes:
      - anneal-node-state-xray:/var/lib/anneal
    ports:
      - "24443:24443"

  singbox-runtime:
    image: anneal-node-agent-e2e
    command:
      - sh
      - -lc
      - while [ ! -f /var/lib/anneal/singbox/config.json ]; do sleep 1; done; while true; do hiddify-core run -c /var/lib/anneal/singbox/config.json || true; sleep 1; done
    volumes:
      - anneal-node-state-singbox:/var/lib/anneal
    ports:
      - "25443:25443"
      - "25444:25444"

  e2e-runner:
    build:
      context: .
      dockerfile: deploy/docker/e2e-runner.Dockerfile
    environment:
      E2E_API_URL: http://api:8080
      E2E_WEB_URL: http://web
      E2E_SHARED_DIR: /e2e
      E2E_BOOTSTRAP_TOKEN: test-bootstrap-token
    volumes:
      - anneal-e2e-shared:/e2e
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      worker:
        condition: service_started
      web:
        condition: service_started
      node-agent-e2e-xray:
        condition: service_started
      node-agent-e2e-singbox:
        condition: service_started

volumes:
  anneal-node-state-xray:
  anneal-node-state-singbox:
  anneal-e2e-shared:
